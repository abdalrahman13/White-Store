<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>White Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style></style>
  </head>
  <body>
    <nav>
      <div class="container">
        <span class="logo" id="logo"><a href="#">White Store</a></span>
        <i class="fa-solid fa-bars menu"></i>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li>
            <a href="products.html">Products</a>
          </li>
          <li><a href="#">Cart</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </div>
    </nav>
    <div action="" class="form">
      <div class="container">
        <input
          type="file"
          class="form-control"
          placeholder="Image_URL"
          id="image"
        />
        <input
          type="text"
          class="form-control"
          placeholder="Product Name"
          id="name"
        />
        <input
        type="number"
        class="form-control"
        placeholder="Price"
        id="price"
        />
        <input
          type="text"
          class="form-control"
          placeholder="Product Category"
          id="category"
        />
        <input
          type="text"
          class="form-control"
          placeholder="Product Description"
          id="description"
        />

        <input type="submit" id="addBtn" class="btn btn-info" />
        <div id="productsContainer">
          <div class="product-card">
            <img src="assets/essential-skincare-routine-overview.jpg" alt="" />
            <div class="content">
              <h3>Cream</h3>
              <p>20</p>
              <button class="deleteBtn" data-id="${productId}">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <section class="contact" id="contact">
      <div class="container">
        <h2>We are here for you, contact us at <span>anytime</span></h2>
        <p>
          Have any question about our services or just want to talk with us?
          Please reach our
        </p>
        <div class="whatsapp">
          <div class="content">
            <i class="fa-solid fa-phone"></i>
            <h4>Call us or Chat by Whatsapp</h4>
          </div>
          <!-- <p></p> -->
          <div class="phone">
            <a href="https://wa.me/+201212990941">+20 12 12990941</a>
            <!-- <ش></span> -->
          </div>
        </div>
      </div>
    </section>
    <footer>© 2026 <span>MyStore</span>. All rights reserved</footer>

    <script src="js/firebase.js" type="module"></script>
    <script src="js/main.js" type="module"></script>
  </body>
</html>
